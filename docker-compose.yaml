services:

  # -------------------------------------------------------------------------
  # Application PHP/Apache + queue worker (via supervisor)
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1001}
        WWWGROUP: ${WWWGROUP:-1001}
    container_name: zone_cine_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Redis (cache + queues)
  # -------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: zone_cine_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      interval: 5s
      timeout: 5s

volumes:
  redis-data:


networks:
  default:
    external: true
    name: scoobydoo
